  .header-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {

  .page-title { color: #fff; font-size: 16px; font-weight: 600; }
  .header-date {

  .header-date .dot { opacity: 0.3; }
  .header-date .lunar { color: rgba(255,255,255,0.4); }

  .container { max-width: var(--max-width); margin: 0 auto; padding: 20px 32px 60px; }

  .section-meta {
    font-size: 14px; color: var(--color-muted); margin-bottom: 16px; padding: 0 4px;
  }

  .news-list {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .news-item {
    display: flex; gap: 14px; padding: 12px 14px;
    background: #ffffff; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid #f0f0f2;
    align-items: flex-start;
  }
  .news-item:last-child { border-bottom: none; }
  .news-item:hover { background: #f8f8fa; }
  .news-thumb {
    width: 72px; height: 72px; border-radius: var(--radius-sm);
    flex-shrink: 0; overflow: hidden; position: relative;
  }
  .news-thumb .list-tag {
    position: absolute; top: 4px; left: 4px;
    padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 600;
    color: #fff; letter-spacing: 0.2px;
  }
  .news-content { flex: 1; min-width: 0; }
  .news-source {
    display: flex; align-items: center; gap: 5px; margin-bottom: 3px;
  }
  .news-source-icon {
    width: 14px; height: 14px; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 7px; color: #fff; flex-shrink: 0;
  }
  .news-source-name { font-size: 11px; font-weight: 600; color: var(--color-muted); letter-spacing: 0.3px; }
  .news-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    overflow: hidden; color: #1d1d1f; margin-bottom: 2px;
  }
  .news-summary {
    font-size: 12px; color: var(--color-muted); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-time { font-size: 11px; color: #a1a1a6; margin-top: 4px; }

  .news-channel { font-size: 11px; color: var(--color-muted); margin-top: 2px; }

  .load-more-wrap { text-align: center; padding: 24px 0 40px; grid-column: 1 / -1; }
  .load-more-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 32px; border: 1px solid #d2d2d7;
    border-radius: 20px; background: #fff; color: #1d1d1f;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .load-more-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
  .load-more-btn:disabled { opacity: 0.4; cursor: default; }
  .loading-spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid #d2d2d7; border-top-color: var(--color-accent);
    border-radius: 50%; animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loaded-all {
    text-align: center; padding: 20px 0 40px;
    font-size: 13px; color: var(--color-muted); grid-column: 1 / -1;
  }

  .footer {
    background: #1d1d1f; color: rgba(255,255,255,0.4);
    padding: 28px 32px; text-align: center; font-size: 12px; line-height: 1.8;

    .news-list { grid-template-columns: 1fr 1fr; }

  @media (max-width: 640px) {
    .container { padding: 14px 14px 40px; }
    .header-inner { padding: 0 14px; }
    .header-date { font-size: 10px; gap: 4px; }
    .header-date .lunar { display: none; }
    .news-list { grid-template-columns: 1fr; gap: 6px; }
    .news-thumb { width: 64px; height: 64px; }
    .news-title { font-size: 13px; }
    .news-item { padding: 10px 12px; }
  }

function rand(n) { return Math.floor(Math.random() * n); }
function pick(arr) { return arr[rand(arr.length)]; }

function genNews(sources, titles, count, tag, tagColor) {
  const items = [];
  for (let i = 0; i < count; i++) {
    const src = sources[i % sources.length];
    const t = titles[i % titles.length];
    const mins = rand(1440) + 10;
    const h = Math.floor(mins / 60);
    items.push({
      source: src.name, icon: src.icon, color: src.color,
      title: t, tag: tag, tagColor: tagColor,
      summary: `${['最新研究显示','业内人士透露','多家媒体确认','据知情人士透露','最新报告显示'][i%5]}，${['值得关注的突破性进展','引发行业广泛讨论','市场反应积极','技术社区高度关注','开启新的可能性'][i%5]}。`,
      time: h < 1 ? `${mins}分钟前` : h < 24 ? `${h}小时前` : `${h/24|0}天前`,
    });
  }
  return items;
}

// ===== Page Config =====
const params = new URLSearchParams(location.search);
const tag = params.get('tag') || 'ai';

const configs = {
  ai: { title: '🤖 AI 资讯', tagLabel: 'AI', sources: aiSources, titles: aiTitles, color: '#7c3aed', isVideo: false },
  tech: { title: '🔧 科技动态', tagLabel: 'TECH', sources: techSources, titles: techTitles, color: '#0891b2', isVideo: false },
  finance: { title: '💰 财经要闻', tagLabel: 'FINANCE', sources: finSources, titles: finTitles, color: '#059669', isVideo: false },
  video: { title: '▶ 热门视频', tagLabel: 'VIDEO', sources: [{name:'YouTube',icon:'▶',color:'#ff0000'}], titles: videoTitles, color: '#e11d48', isVideo: true },
};

const cfg = configs[tag] || configs.ai;
document.getElementById('pageTitle').textContent = cfg.title.replace(/[🤖🔧💰▶]/g,'').trim() || cfg.title;

// ===== Generate Data =====
let allItems;
if (tag === 'video') {
  allItems = [];
  for (let i = 0; i < 50; i++) {
    const t = cfg.titles[i % cfg.titles.length];
    const mins = rand(1440) + 10;
    const h = Math.floor(mins / 60);
    allItems.push({
      source: 'YouTube', icon: '▶', color: '#ff0000',
      title: t, tag: 'VIDEO', tagColor: cfg.color,
      summary: pick(channels),
      time: h < 1 ? `${mins}分钟前` : h < 24 ? `${h}小时前` : `${h/24|0}天前`,
    });
  }
} else {
  allItems = genNews(cfg.sources, cfg.titles, 50, cfg.tagLabel, cfg.color);
}

// ===== Pagination State =====
const PAGE_SIZE = 20;
let rendered = 0;
const list = document.getElementById('newsList');
const meta = document.getElementById('sectionMeta');
meta.textContent = `共 ${allItems.length} 条内容`;

function renderItem(item) {
  const isVideo = tag === 'video';
  const grad = isVideo
    ? `linear-gradient(135deg,${['#1e293b','#4f46e5','#0891b2','#dc2626','#059669'][rand(5)]},${['#334155','#6366f1','#22d3ee','#f43f5e','#34d399'][rand(5)]})`
    : `linear-gradient(135deg,#e2e8f0,#cbd5e1)`;
  const thumb = isVideo
    ? `<div class="news-thumb" style="background:${grad};">
        <span class="list-tag" style="background:${cfg.color};">视频</span>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,0.3);">▶</div>
        <span style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.8);color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;">${[24,18,32,14,27,21,45,9,38,16][rand(10)]}:${String(rand(60)).padStart(2,'0')}</span>
      </div>`
    : `<div class="news-thumb" style="background:${grad};">
        <span class="list-tag" style="background:${item.tagColor};">${item.tag === 'VIDEO' ? '视频' : item.tag}</span>
      </div>`;
  const after = isVideo
    ? `<div class="news-channel">${pick(channels)} · ${rand(50)+1}万次观看</div>`
    : `<div class="news-time">${item.time}</div>`;
  return `<div class="news-item" onclick="window.open('#','_blank')">
    ${thumb}
    <div class="news-content">
      <div class="news-source">
        <span class="news-source-icon" style="background:${item.color};">${item.icon}</span>
        <span class="news-source-name">${item.source}</span>
      </div>
      <div class="news-title">${item.title}</div>
      <div class="news-summary">${item.summary}</div>
      ${after}
    </div>
  </div>`;
}

function loadMore() {
  const next = Math.min(rendered + PAGE_SIZE, allItems.length);
  const fragment = document.createDocumentFragment();
  const tmp = document.createElement('div');
  for (let i = rendered; i < next; i++) {
    tmp.innerHTML = renderItem(allItems[i]);
    while (tmp.firstChild) fragment.appendChild(tmp.firstChild);
  }
  list.appendChild(fragment);
  rendered = next;
  if (rendered >= allItems.length) {
    document.getElementById('loadMoreWrap').style.display = 'none';
    document.getElementById('loadedAll').style.display = 'block';
  }
}

// Initial load
loadMore();

// Button handler
document.getElementById('loadMoreBtn').addEventListener('click', function() {
  const btn = this;
  const spinner = document.getElementById('spinner');
  const txt = document.getElementById('btnText');
  btn.disabled = true;
  spinner.style.display = 'inline-block';
  txt.textContent = '加载中...';
  setTimeout(() => {
    loadMore();
    btn.disabled = false;
    spinner.style.display = 'none';
    txt.textContent = '加载更多';
  }, 400);
});

// Infinite scroll
let scrollTimer;
window.addEventListener('scroll', function() {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(function() {
    const btn = document.getElementById('loadMoreBtn');
    if (!btn || btn.disabled || rendered >= allItems.length) return;
    const rect = btn.getBoundingClientRect();
    if (rect.top < window.innerHeight + 100) btn.click();
  }, 200);
});

// ===== Date & Lunar Calendar =====
(function() {
  const weekNames = ['周日','周一','周二','周三','周四','周五','周六'];
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const dow = weekNames[now.getDay()];
  document.getElementById('dateStr').textContent = y + '年' + m + '月' + d + '日';
  document.getElementById('weekStr').textContent = dow;
  try {
    var fmt = new Intl.DateTimeFormat('zh-CN-u-ca-chinese', { year:'numeric', month:'long', day:'numeric' });
    var lunarText = fmt.format(now).replace(/^\d+年/, '').replace(/\s+/g, '');
    document.getElementById('lunarStr').textContent = '农历' + lunarText;
  } catch(e) {
    document.getElementById('lunarStr').textContent = '';
  }
})();
